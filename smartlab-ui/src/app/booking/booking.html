<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <!-- Navigation -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-800">LabCrop - Bookings</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button
            routerLink="/dashboard"
            class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
            Dashboard
          </button>
          <button
            routerLink="/booking"
            class="text-blue-600 px-3 py-2 rounded-md text-sm font-medium">
            Bookings
          </button>
          <button
            routerLink="/report"
            class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
            Reports
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Create Booking Form -->
        <div class="bg-white shadow rounded-lg p-6">
          <h3 class="text-lg font-medium text-gray-900 mb-4">Create New Booking</h3>

          <form class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">User ID</label>
              <input
                [(ngModel)]="userId"
                name="userId"
                type="number"
                class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                placeholder="Enter user ID">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700">Test ID</label>
              <input
                [(ngModel)]="testId"
                name="testId"
                type="number"
                class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                placeholder="Enter test ID">
            </div>

            <div *ngIf="error" class="text-red-600 text-sm">
              {{ error }}
            </div>

            <button
              (click)="create()"
              [disabled]="creating"
              class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition duration-200">
              <span *ngIf="creating" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></span>
              {{ creating ? 'Creating...' : 'Create Booking' }}
            </button>
          </form>
        </div>

        <!-- Bookings List -->
        <div class="bg-white shadow rounded-lg p-6">
          <h3 class="text-lg font-medium text-gray-900 mb-4">Recent Bookings</h3>

          <div *ngIf="loading" class="flex justify-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
          </div>

          <div *ngIf="!loading && bookings.length === 0" class="text-center py-8 text-gray-500">
            No bookings found
          </div>

          <div class="space-y-4" *ngIf="!loading && bookings.length > 0">
            <div *ngFor="let booking of bookings" class="border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-200">
              <div class="flex justify-between items-start">
                <div>
                  <h4 class="text-sm font-medium text-gray-900">Booking #{{ booking.id }}</h4>
                  <p class="text-sm text-gray-600">User ID: {{ booking.userId }}</p>
                  <p class="text-sm text-gray-600">Test ID: {{ booking.testId }}</p>
                </div>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                      [class]="booking.status === 'confirmed' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'">
                  {{ booking.status || 'pending' }}
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
