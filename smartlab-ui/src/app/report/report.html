<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
  <!-- Navigation -->
  <nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <h1 class="text-xl font-bold text-gray-800">LabCrop - Reports</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button
            routerLink="/dashboard"
            class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
            Dashboard
          </button>
          <button
            routerLink="/booking"
            class="text-gray-600 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium transition duration-200">
            Bookings
          </button>
          <button
            routerLink="/report"
            class="text-blue-600 px-3 py-2 rounded-md text-sm font-medium">
            Reports
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <div class="bg-white shadow rounded-lg p-6">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Test Reports</h3>

        <div *ngIf="loading" class="flex justify-center py-8">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
        </div>

        <div *ngIf="!loading && error" class="text-center py-8 text-red-600">
          {{ error }}
        </div>

        <div *ngIf="!loading && reports.length === 0 && !error" class="text-center py-8 text-gray-500">
          No reports available
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" *ngIf="!loading && reports.length > 0">
          <div *ngFor="let report of reports" class="bg-gray-50 border border-gray-200 rounded-lg p-4 hover:shadow-md transition duration-200">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <h4 class="text-sm font-medium text-gray-900">Report #{{ report.id }}</h4>
                <p class="text-sm text-gray-600 mt-1">Booking ID: {{ report.bookingId }}</p>
                <p class="text-sm text-gray-600">Test ID: {{ report.testId }}</p>
              </div>
            </div>
            <div class="mt-4">
              <a
                [href]="report.fileUrl"
                target="_blank"
                class="inline-flex items-center px-3 py-2 border border-transparent text-sm leading-4 font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-200">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                Download Report
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
