<div class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white bg-opacity-20 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
      <p class="text-white text-opacity-80">Sign in to your account</p>
    </div>

    <form class="space-y-6">
      <div>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="Email Address"
          class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-white placeholder-opacity-70 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50 transition duration-200"
          required>
      </div>

      <div>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="Password"
          class="w-full px-4 py-3 bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg text-white placeholder-white placeholder-opacity-70 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50 transition duration-200"
          required>
      </div>

      <div *ngIf="error" class="text-red-300 text-sm text-center">
        {{ error }}
      </div>

      <button
        (click)="login()"
        [disabled]="loading"
        class="w-full py-3 bg-white text-purple-600 font-semibold rounded-lg hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="loading" class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-purple-600 mr-2"></span>
        {{ loading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
