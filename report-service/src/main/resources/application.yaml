server:
  port: 8085

spring:
  application:
    name: report-service

  datasource:
    url: jdbc:mysql://localhost:3306/reports_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka